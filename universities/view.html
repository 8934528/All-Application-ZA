<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universities - All Application ZA</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="css/universities.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container flex-between">
            <a href="../index.html" class="logo">
                <span>All</span>
                <span>Application</span>
                <span>ZA</span>
            </a>
            <nav class="auth-buttons">
                <a href="../auth/login.html" class="btn btn-primary">Login</a>
                <a href="../auth/register.html" class="btn btn-secondary">Register</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="universities-page">
        <div class="container">
            <div class="page-header">
                <h1>South African Universities</h1>
                <div class="search-filter">
                    <input type="text" placeholder="Search universities...">
                    <select>
                        <option value="all">All Provinces</option>
                        <option value="gauteng">Gauteng</option>
                        <option value="western-cape">Western Cape</option>
                        <!-- Add more provinces -->
                    </select>
                </div>
            </div>
            
            <div id="universities-container" class="universities-grid">
                <!-- Universities will be loaded here -->
            </div>
        </div>
    </main>

    <!-- University Details Modal -->
    <div id="university-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="university-details">
                <!-- University details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2023 All Application ZA. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/universities.js"></script>
</body>
</html>
